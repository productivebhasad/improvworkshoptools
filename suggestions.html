  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }

    #title-display {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 700px;
    }

    #title-display .title {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.3;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #title-display .placeholder {
      font-size: 1.1rem;
      color: #64748b;
    }

    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      background: #6366f1;
      color: #fff;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.97); }

    #spoiler-display {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 700px;
    }

    #spoiler-display .title {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.3;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);

      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #inspiration-display {

      align-items: center;
